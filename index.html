<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🏏 Cricket Prediction League</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet"/>

<style>

:root{
  --pitch:#0d1d0d;
  --card:#162816;
  --card2:#1c3220;
  --border:#274527;
  --lime:#4caf50;
  --gold:#f0c040;
  --cream:#f2ead5;
  --muted:#7aaa7a;
  --white:#fff;
  --blue:#42a5f5;
  --orange:#ff8a65;
  --red:#ef5350;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:'Barlow',sans-serif;
  background:var(--pitch);
  color:var(--cream);
  min-height:100vh;

  background-image:
    radial-gradient(ellipse 60% 40% at 10% 0%,rgba(30,70,30,.35) 0%,transparent 70%),
    radial-gradient(ellipse 50% 40% at 90% 100%,rgba(10,30,10,.4) 0%,transparent 70%),
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 47px,
      rgba(76,175,80,.03) 47px,
      rgba(76,175,80,.03) 48px
    );
}

/* HEADER */

.hdr{
  background:linear-gradient(135deg,#09160a,#122012,#09160a);
  border-bottom:2px solid var(--gold);
  padding:18px 20px 14px;
  position:sticky;
  top:0;
  z-index:100;
  box-shadow:0 6px 32px rgba(0,0,0,.7);
}

.hdr-in{
  max-width:1100px;
  margin:0 auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:10px;
}

.logo{
  display:flex;
  align-items:center;
  gap:14px;
}

.logo-icon{
  font-size:2.3rem;
}

.logo h1{
  font-family:'Oswald',sans-serif;
  font-size:1.5rem;
  font-weight:700;
  letter-spacing:2px;
  color:var(--gold);
  text-transform:uppercase;
}

.logo p{
  font-family:'Barlow Condensed',sans-serif;
  font-size:.8rem;
  color:var(--muted);
}

.hdr-r{
  display:flex;
  align-items:center;
  gap:10px;
}

.ts-lbl{
  font-size:.75rem;
  color:var(--muted);
}

.rbtn{
  background:rgba(240,192,64,.12);
  border:1px solid rgba(240,192,64,.3);
  color:var(--gold);
  padding:7px 14px;
  border-radius:6px;
  cursor:pointer;
}

.tabs{
  max-width:1100px;
  margin:20px auto 0;
  padding:0 14px;
  display:flex;
  gap:2px;
  border-bottom:2px solid var(--border);
}

.tab{
  padding:10px 20px;
  cursor:pointer;
  color:var(--muted);
  border-bottom:2px solid transparent;
}

.tab.active{
  color:var(--gold);
  border-bottom-color:var(--gold);
}

.content{
  max-width:1100px;
  margin:0 auto;
  padding:16px 12px 60px;
}

.tab-panel{
  display:none;
}

.tab-panel.active{
  display:block;
}

/* STATUS */

.status{
  text-align:center;
  padding:70px 20px;
  color:var(--muted);
}

.spin{
  width:46px;
  height:46px;
  border:4px solid rgba(76,175,80,.15);
  border-top-color:var(--lime);
  border-radius:50%;
  animation:spin .7s linear infinite;
  margin:0 auto 18px;
}

@keyframes spin{
  to{
    transform:rotate(360deg)
  }
}

/* SECTION */

.sh{
  display:flex;
  align-items:baseline;
  gap:12px;
  margin-bottom:14px;
  padding-bottom:10px;
  border-bottom:1px solid var(--border);
}

.sh-t{
  font-family:'Oswald',sans-serif;
  font-size:1.05rem;
  color:var(--gold);
}

.sh-b{
  color:var(--muted);
}

/* MATCH INFO */

.match-info-bar{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px 14px;
  margin-bottom:12px;
}

.mi-fixture{
  font-weight:700;
  margin-bottom:5px;
}

.mi-row{
  font-size:.85rem;
  color:var(--muted);
  margin-top:4px;
}

.mi-result{
  color:var(--gold);
  font-weight:700;
  margin-top:6px;
}

/* INNINGS */

.innings-box{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;
  overflow:hidden;
  margin-bottom:10px;
}

.inn-header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px 14px;
  cursor:pointer;
}

.inn-team{
  flex:1;
  font-family:'Oswald',sans-serif;
}

.inn-score{
  color:var(--gold);
  font-family:'Oswald',sans-serif;
  font-size:1.2rem;
}

.inn-body{
  display:none;
  border-top:1px solid var(--border);
}

.innings-box.open .inn-body{
  display:block;
}

.sc-section{
  padding:10px 12px;
}

.sc-sec-title{
  color:var(--muted);
  margin-bottom:8px;
}

.sc-tbl{
  width:100%;
  border-collapse:collapse;
}

.sc-tbl th,
.sc-tbl td{
  padding:6px 8px;
  border-bottom:1px solid rgba(39,69,39,.3);
  text-align:right;
}

.sc-tbl th:first-child,
.sc-tbl td:first-child{
  text-align:left;
}

.td-name{
  color:var(--blue);
}

.td-total-val{
  color:var(--gold);
  font-weight:700;
}

/* DREAM 7 */

.d7-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(148px,1fr));
  gap:10px;
}

.d7-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;
  padding:14px;
  text-align:center;
}

.d7-nm{
  margin-bottom:6px;
}

.d7-pt{
  font-size:1.8rem;
  color:var(--blue);
  font-family:'Oswald',sans-serif;
}

/* PREDICTIONS */

.pred-list{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.pred-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;
  overflow:hidden;
}

.pred-summary{
  display:flex;
  align-items:center;
  padding:13px 16px;
  gap:12px;
  cursor:pointer;
}

.pred-rank{
  width:28px;
  text-align:center;
  font-family:'Oswald',sans-serif;
}

.pred-avt{
  width:38px;
  height:38px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--card2),var(--lime));
  display:flex;
  align-items:center;
  justify-content:center;
}

.pred-nm-wrap{
  flex:1;
}

.pred-nm{
  font-weight:700;
}

.pred-tot{
  color:var(--lime);
  font-size:1.4rem;
  font-family:'Oswald',sans-serif;
}

.expand-btn{
  width:28px;
  height:28px;
  border-radius:50%;
  border:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
}

.pred-details{
  display:none;
  border-top:1px solid var(--border);
  padding:12px 16px;
}

.pred-card.open .pred-details{
  display:block;
}

.pred-row{
  display:flex;
  gap:8px;
  padding:6px 0;
  border-bottom:1px solid rgba(39,69,39,.4);
}

.pred-lbl{
  width:110px;
  color:var(--muted);
}

.pred-val{
  flex:1;
}

.winner{color:var(--lime);}
.captain{color:var(--gold);}
.vc{color:var(--blue);}
.extra{color:var(--orange);}

.pp{
  color:var(--lime);
}

/* LIVE */

.live-box{
  background:var(--card);
  border:1px solid rgba(76,175,80,.3);
  border-radius:10px;
  overflow:hidden;
  margin-bottom:14px;
}

.live-title{
  padding:8px 12px;
  background:rgba(76,175,80,.08);
  color:var(--lime);
}

.live-tbl{
  width:100%;
  border-collapse:collapse;
}

.live-tbl td,
.live-tbl th{
  padding:8px 10px;
  border-bottom:1px solid rgba(39,69,39,.3);
}

</style>
</head>

<body>

<div class="hdr">
  <div class="hdr-in">

    <div class="logo">
      <div class="logo-icon">🏏</div>
      <div>
        <h1>Cricket Prediction League</h1>
        <p>Live Scorecard & Predictions</p>
      </div>
    </div>

    <div class="hdr-r">
      <span class="ts-lbl" id="tsLbl">Fetching...</span>
      <button class="rbtn" id="rBtn" onclick="loadData()">⟳ Refresh</button>
    </div>

  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('sc',this)">📋 Scorecard</div>
  <div class="tab" onclick="switchTab('pred',this)">🎯 Predictions</div>
</div>

<div class="content">

  <!-- SCORECARD -->

  <div class="tab-panel active" id="tab-sc">

    <div id="sc-ld" class="status">
      <div class="spin"></div>
      <h3>Loading Scorecard...</h3>
    </div>

    <div id="sc-main" style="display:none">

      <div class="match-info-bar">
        <div class="mi-fixture" id="mi-fixture">—</div>
        <div class="mi-row" id="mi-venue"></div>
        <div class="mi-row" id="mi-rr"></div>
        <div class="mi-result" id="mi-result"></div>
      </div>

      <!-- innings 1 -->

      <div class="innings-box open">

        <div class="inn-header"
             onclick="this.parentElement.classList.toggle('open')">

          <div class="inn-team" id="inn1-team"></div>
          <div class="inn-score" id="inn1-score"></div>

        </div>

        <div class="inn-body">

          <div class="sc-section">
            <div class="sc-sec-title">🏏 Batting</div>
            <table class="sc-tbl" id="inn1-bat"></table>
          </div>

          <div class="sc-section">
            <div class="sc-sec-title">⚾ Bowling</div>
            <table class="sc-tbl" id="inn1-bowl"></table>
          </div>

        </div>

      </div>

      <!-- innings 2 -->

      <div class="innings-box">

        <div class="inn-header"
             onclick="this.parentElement.classList.toggle('open')">

          <div class="inn-team" id="inn2-team"></div>
          <div class="inn-score" id="inn2-score"></div>

        </div>

        <div class="inn-body">

          <div class="sc-section">
            <div class="sc-sec-title">🏏 Batting</div>
            <table class="sc-tbl" id="inn2-bat"></table>
          </div>

          <div class="sc-section">
            <div class="sc-sec-title">⚾ Bowling</div>
            <table class="sc-tbl" id="inn2-bowl"></table>
          </div>

        </div>

      </div>

      <!-- live -->

      <div class="live-box">

        <div class="live-title">
          LIVE
        </div>

        <table class="live-tbl" id="live-tbl"></table>

      </div>

      <!-- dream 7 -->

      <div class="sh">
        <div class="sh-t">🌟 Dream 7 Players</div>
      </div>

      <div class="d7-grid" id="d7-list"></div>

    </div>

  </div>

  <!-- PREDICTIONS -->

  <div class="tab-panel" id="tab-pred">

    <div id="pred-ld" class="status">
      <div class="spin"></div>
      <h3>Loading Predictions...</h3>
    </div>

    <div id="pred-main" style="display:none">

      <div class="sh">
        <div class="sh-t">Predictions</div>
        <div class="sh-b" id="pred-cnt"></div>
      </div>

      <div class="pred-list" id="pred-list"></div>

    </div>

  </div>

</div>

<script>

const SHEET_ID='1FrLu-ket-ZUIE5UPr8BkVuuvRMWtoJ3O283RIsosarg';

const BASE=
`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

const $=id=>document.getElementById(id);

function sh(id){
  $(id).style.display='';
}

function hd(id){
  $(id).style.display='none';
}

function switchTab(name,el){

  document
    .querySelectorAll('.tab')
    .forEach(t=>t.classList.remove('active'));

  document
    .querySelectorAll('.tab-panel')
    .forEach(t=>t.classList.remove('active'));

  el.classList.add('active');

  $('tab-'+name).classList.add('active');
}

function esc(s){
  return String(s||'')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

function fmt(v){
  const n=parseFloat(v);
  return isNaN(n)?0:(n%1===0?n:n.toFixed(1));
}

function parseCSV(t){

  const rows=[];

  for(const line of t.split('\n')){

    const cols=[];

    let cur='';
    let inQ=false;

    for(let i=0;i<line.length;i++){

      const c=line[i];

      if(c==='"'){
        inQ=!inQ;
      }

      else if(c===','&&!inQ){
        cols.push(cur.trim());
        cur='';
      }

      else{
        cur+=c;
      }
    }

    cols.push(cur.trim());

    rows.push(cols);
  }

  return rows;
}

async function fetchSheet(name){

  const r=await fetch(
    `${BASE}&sheet=${encodeURIComponent(name)}`
  );

  return parseCSV(await r.text());
}

async function loadData(){

  $('rBtn').disabled=true;

  const [pred,sc]=await Promise.all([
    fetchSheet('Prediction LO'),
    fetchSheet('Scorecard T20')
  ]);

  renderScorecard(pred,sc);

  renderPredictions(
    pred.slice(1,21).filter(r=>r.some(c=>c)),
    pred
  );

  $('tsLbl').textContent=
    'Updated '+
    new Date().toLocaleTimeString();

  hd('sc-ld');
  sh('sc-main');

  hd('pred-ld');
  sh('pred-main');

  $('rBtn').disabled=false;
}

function renderScorecard(pred,sc){

  $('mi-fixture').textContent=(pred[21]||[])[0]||'';

  $('mi-venue').textContent=
    'Venue: '+((pred[22]||[])[12]||'');

  $('mi-rr').textContent=
    'Run Rate: '+((pred[22]||[])[8]||'');

  $('mi-result').textContent=
    (sc[34]||[])[10]||'';

  $('inn1-team').textContent=(sc[32]||[])[10]||'';
  $('inn1-score').textContent=(sc[32]||[])[11]||'';

  $('inn2-team').textContent=(sc[33]||[])[10]||'';
  $('inn2-score').textContent=(sc[33]||[])[11]||'';

  buildSimpleTable(
    'inn1-bat',
    sc.slice(1,30).map(r=>r.slice(10,16))
  );

  buildSimpleTable(
    'inn1-bowl',
    sc.slice(1,12).map(r=>r.slice(27,34))
  );

  buildSimpleTable(
    'inn2-bat',
    sc.slice(1,30).map(r=>r.slice(41,47))
  );

  buildSimpleTable(
    'inn2-bowl',
    sc.slice(1,12).map(r=>r.slice(58,65))
  );

  buildSimpleTable(
    'live-tbl',
    sc.slice(35,42).map(r=>r.slice(2,8))
  );

  const d7=$('d7-list');

  d7.innerHTML='';

  pred.slice(46,53).forEach(r=>{

    const nm=r[9]||'';
    const pts=r[10]||'0';

    if(!nm)return;

    d7.innerHTML+=`
      <div class="d7-card">
        <div class="d7-nm">${esc(nm)}</div>
        <div class="d7-pt">${fmt(pts)}</div>
      </div>
    `;
  });
}

function buildSimpleTable(id,data){

  const tbl=$(id);

  tbl.innerHTML='';

  data.forEach(r=>{

    if(!r.some(c=>c))return;

    let tr='<tr>';

    r.forEach((c,i)=>{

      tr+=`
        <td class="${i===0?'td-name':''}">
          ${esc(c)}
        </td>
      `;
    });

    tr+='</tr>';

    tbl.innerHTML+=tr;
  });
}

const FIELDS=[
  {col:2,lbl:'Winner',cls:'winner'},
  {col:3,lbl:'1st Score',cls:''},
  {col:4,lbl:'2nd Score',cls:''},
  {col:5,lbl:'Player 1',cls:''},
  {col:6,lbl:'Player 2',cls:''},
  {col:7,lbl:'Player 3',cls:''},
  {col:8,lbl:'Player 4',cls:''},
  {col:9,lbl:'Player 5',cls:''},
  {col:10,lbl:'Captain',cls:'captain'},
  {col:11,lbl:'Vice Captain',cls:'vc'},
  {col:12,lbl:'Extra Prediction',cls:'extra'}
];

function renderPredictions(rows,allRows){

  const ptsMap={};

  allRows.slice(23,43).forEach(r=>{

    const nm=(r[1]||'').trim().toLowerCase();

    if(!nm)return;

    let total=0;

    r.forEach((c,i)=>{

      if(i<2)return;

      const n=parseFloat(c);

      if(!isNaN(n))total+=n;
    });

    ptsMap[nm]=total;
  });

  const people=rows.map(r=>({

    row:r,

    name:(r[1]||'').trim(),

    total:ptsMap[((r[1]||'').trim().toLowerCase())]||0

  }));

  people.sort((a,b)=>b.total-a.total);

  $('pred-cnt').textContent=
    people.length+' entries';

  const list=$('pred-list');

  list.innerHTML='';

  people.forEach((p,i)=>{

    const rank=i+1;

    const initials=p.name
      .split(' ')
      .map(w=>w[0])
      .join('')
      .slice(0,2)
      .toUpperCase();

    const card=document.createElement('div');

    card.className='pred-card';

    card.innerHTML=`

      <div class="pred-summary"
           onclick="this.parentElement.classList.toggle('open')">

        <div class="pred-rank">
          ${rank}
        </div>

        <div class="pred-avt">
          ${initials}
        </div>

        <div class="pred-nm-wrap">

          <div class="pred-nm">
            ${esc(p.name)}
          </div>

          <div class="pred-ts-sm">
            ${p.row[0]||''}
          </div>

        </div>

        <div>

          <div class="pred-tot">
            ${fmt(p.total)}
          </div>

          <div class="pred-tot-lbl">
            Pts
          </div>

        </div>

        <div class="expand-btn">+</div>

      </div>

      <div class="pred-details">

        ${FIELDS.map(f=>`

          <div class="pred-row">

            <div class="pred-lbl">
              ${f.lbl}
            </div>

            <div class="pred-val ${f.cls}">
              ${esc(p.row[f.col]||'—')}
            </div>

            <div class="pp">
              +
            </div>

          </div>

        `).join('')}

      </div>

    `;

    list.appendChild(card);

  });
}

loadData();

</script>

</body>
</html>
